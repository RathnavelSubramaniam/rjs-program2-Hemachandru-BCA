name: Autograding

on:
  push:
  pull_request:

jobs:
  AutoGrading:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: AutoGrading Report 
        run: npm test
